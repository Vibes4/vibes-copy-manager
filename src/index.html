<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:      { DEFAULT: '#0e0e12', card: '#16161d', hover: '#1e1e28' },
            border:  { DEFAULT: '#232330', light: '#2a2a3a' },
            accent:  '#6c5ce7',
            txt:     { DEFAULT: '#e2e2e8', dim: '#6b6b80', muted: '#45455a' },
          },
          fontSize: {
            '2xs': ['0.65rem', '0.9rem'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark bg-bg text-txt overflow-hidden select-none">
  <div id="app" class="flex flex-col h-screen">

    <!-- Draggable title bar -->
    <header class="drag-region flex items-center justify-between px-4 pt-3 pb-2 shrink-0">
      <div class="flex items-center gap-2">
        <svg class="w-4 h-4 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <h1 class="text-xs font-semibold tracking-wide text-txt/80 uppercase">Clipboard</h1>
      </div>
      <div class="flex items-center gap-1.5 no-drag">
        <button id="clear-btn" title="Clear history"
          class="p-1 rounded hover:bg-border transition-colors text-txt-muted hover:text-red-400">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
        <button id="close-btn" title="Close (Esc)"
          class="p-1 rounded hover:bg-border transition-colors text-txt-muted hover:text-txt">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="px-3 pb-2 shrink-0">
      <div class="relative">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-txt-muted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search clipboard…"
          autocomplete="off"
          class="w-full bg-bg-card border border-border rounded-lg pl-8 pr-3 py-1.5 text-sm text-txt placeholder-txt-muted focus:outline-none focus:border-accent/50 transition-colors"
        />
      </div>
    </div>

    <!-- Item count -->
    <div class="px-4 pb-1 shrink-0">
      <span id="item-count" class="text-2xs text-txt-muted">0 items</span>
    </div>

    <!-- Clipboard list -->
    <div id="list-container" class="flex-1 overflow-y-auto px-3 pb-3 scroll-area">
      <div id="empty-state" class="flex flex-col items-center justify-center h-full text-txt-muted">
        <svg class="w-10 h-10 mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <p class="text-xs">Clipboard is empty</p>
        <p class="text-2xs mt-0.5 opacity-60">Copy something to get started</p>
      </div>
      <ul id="clip-list" class="space-y-1 hidden"></ul>
    </div>

    <!-- Footer hint -->
    <footer class="shrink-0 px-4 py-1.5 border-t border-border text-2xs text-txt-muted flex items-center justify-between">
      <span><kbd class="kbd">↑↓</kbd> navigate · <kbd class="kbd">Enter</kbd> paste · <kbd class="kbd">Esc</kbd> hide · <kbd class="kbd">Ctrl+Shift+V</kbd> toggle</span>
      <span id="status-indicator" class="flex items-center gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        Watching
      </span>
    </footer>

  </div>

  <script src="/clipboard.js"></script>
  <script src="/app.js"></script>
</body>
</html>
