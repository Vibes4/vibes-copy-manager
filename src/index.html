<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibes Copy Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:      { DEFAULT: 'var(--bg)',      card: 'var(--bg-card)', hover: 'var(--bg-hover)' },
            border:  { DEFAULT: 'var(--border)',  light: 'var(--border-light)' },
            accent:  'var(--accent)',
            txt:     { DEFAULT: 'var(--txt)',     dim: 'var(--txt-dim)',  muted: 'var(--txt-muted)' },
          },
          fontSize: {
            '2xs': ['0.65rem', '0.9rem'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="text-txt overflow-hidden select-none bg-transparent">
  <div id="app" class="flex flex-col h-screen bg-bg rounded-xl">

    <!-- Header (drag region) -->
    <header id="header" data-tauri-drag-region class="flex items-center justify-between px-4 pt-3 pb-2 shrink-0 drag-region">
      <div data-tauri-drag-region class="flex items-center gap-2">
        <svg data-tauri-drag-region class="w-4 h-4 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <h1 data-tauri-drag-region class="text-xs font-semibold tracking-wide text-txt/80 uppercase">Clipboard</h1>
      </div>
      <div class="flex items-center gap-1.5">
        <button id="settings-btn" title="Settings"
          class="p-1 rounded hover:bg-border transition-colors text-txt-muted hover:text-txt">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <button id="clear-btn" title="Clear history"
          class="p-1 rounded hover:bg-border transition-colors text-txt-muted hover:text-red-400">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
        <button id="close-btn" title="Close (Esc)"
          class="p-1 rounded hover:bg-border transition-colors text-txt-muted hover:text-txt">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="px-3 pb-2 shrink-0">
      <div class="relative">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-txt-muted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search clipboard…"
          autocomplete="off"
          class="w-full bg-bg-card border border-border rounded-lg pl-8 pr-3 py-1.5 text-sm text-txt placeholder-txt-muted focus:outline-none focus:border-accent/50 transition-colors"
        />
      </div>
    </div>

    <!-- Item count -->
    <div class="px-4 pb-1 shrink-0">
      <span id="item-count" class="text-2xs text-txt-muted">0 items</span>
    </div>

    <!-- Clipboard list -->
    <div id="list-container" class="flex-1 overflow-y-auto px-3 pb-3 scroll-area">
      <div id="empty-state" class="flex flex-col items-center justify-center h-full text-txt-muted">
        <svg class="w-10 h-10 mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <p class="text-xs">Clipboard is empty</p>
        <p class="text-2xs mt-0.5 opacity-60">Copy something to get started</p>
      </div>
      <ul id="clip-list" class="space-y-1 hidden"></ul>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
      <div class="bg-bg-card border border-border rounded-xl p-5 w-80 shadow-2xl">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold text-txt">Settings</h2>
          <button id="settings-close" class="p-1 rounded hover:bg-border text-txt-muted hover:text-txt transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="block mb-3">
          <div class="flex items-center justify-between mb-1">
            <span class="text-2xs text-txt-muted uppercase tracking-wider block">Global Shortcut</span>
            <button id="shortcut-mode-toggle" type="button"
              class="text-2xs text-accent hover:text-accent/80 transition-colors flex items-center gap-1"
              title="Switch between key capture and manual text input">
              <svg id="mode-icon-keyboard" class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
              </svg>
              <span id="mode-label">Type manually</span>
            </button>
          </div>

          <!-- Recorder mode (default) -->
          <div id="shortcut-recorder-wrap">
            <div id="shortcut-recorder"
              tabindex="0"
              class="shortcut-recorder w-full bg-bg border border-border rounded-lg px-3 py-1.5 text-sm text-txt focus:outline-none focus:border-accent/50 transition-colors cursor-pointer flex items-center justify-between min-h-[34px]">
              <span id="shortcut-display" class="shortcut-keys">Click to record shortcut…</span>
              <button id="shortcut-clear" type="button" class="text-txt-muted hover:text-red-400 transition-colors ml-2 shrink-0 hidden" title="Clear shortcut">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Text input mode (hidden by default) -->
          <div id="shortcut-text-wrap" class="hidden">
            <input id="shortcut-text-input" type="text"
              class="w-full bg-bg border border-border rounded-lg px-3 py-1.5 text-sm text-txt focus:outline-none focus:border-accent/50 transition-colors"
              placeholder="e.g. Super+V, Ctrl+Shift+V, Alt+V" />
          </div>

          <input id="shortcut-input" type="hidden" />
          <p id="shortcut-hint" class="text-2xs text-txt-muted mt-1">Click and press your desired key combination. Leave empty to disable.</p>
        </div>

        <label class="block mb-3">
          <span class="text-2xs text-txt-muted uppercase tracking-wider mb-1 block">Max History Items</span>
          <input id="max-items-input" type="number" min="10" max="5000"
            class="w-full bg-bg border border-border rounded-lg px-3 py-1.5 text-sm text-txt focus:outline-none focus:border-accent/50 transition-colors"
            placeholder="50" />
        </label>

        <div class="mb-3">
          <span class="text-2xs text-txt-muted uppercase tracking-wider mb-1.5 block">Theme</span>
          <div class="flex gap-1.5">
            <button data-theme="dark"
              class="theme-btn flex-1 text-xs py-1.5 rounded-lg border border-border transition-colors">
              Dark
            </button>
            <button data-theme="light"
              class="theme-btn flex-1 text-xs py-1.5 rounded-lg border border-border transition-colors">
              Light
            </button>
            <button data-theme="system"
              class="theme-btn flex-1 text-xs py-1.5 rounded-lg border border-border transition-colors">
              System
            </button>
          </div>
        </div>

        <label class="flex items-center gap-2.5 mb-4 cursor-pointer">
          <input id="autostart-toggle" type="checkbox"
            class="w-4 h-4 rounded border-border bg-bg accent-accent cursor-pointer" />
          <span class="text-sm text-txt">Start on system login</span>
        </label>

        <div class="flex items-center gap-2">
          <button id="settings-save"
            class="flex-1 bg-accent hover:bg-accent/80 text-white text-sm font-medium rounded-lg py-1.5 transition-colors">
            Save
          </button>
          <button id="settings-cancel"
            class="flex-1 bg-border hover:bg-border-light text-txt text-sm font-medium rounded-lg py-1.5 transition-colors">
            Cancel
          </button>
        </div>
        <p id="settings-error" class="text-2xs text-red-400 mt-2 hidden"></p>
      </div>
    </div>

    <!-- Footer hint -->
    <footer class="shrink-0 px-4 py-1.5 border-t border-border text-2xs text-txt-muted flex items-center justify-between">
      <span><kbd class="kbd">↑↓</kbd> navigate · <kbd class="kbd">Enter</kbd> paste · <kbd class="kbd">Esc</kbd> hide · <kbd class="kbd">P</kbd> pin</span>
      <span id="status-indicator" class="flex items-center gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        Watching
      </span>
    </footer>

  </div>

  <script src="/clipboard.js"></script>
  <script src="/app.js"></script>
</body>
</html>
